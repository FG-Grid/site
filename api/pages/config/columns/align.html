<h3>align</h3>
<code class="type">String</code>

<p>Cell text align.</p>
<p>Values: 'left', 'center', 'right'</p>
<p>
  If column type is <code class="js">number</code><br>
  <code class="js">align</code> and <code>headerAlign</code> values changes to <code class="js">right</code><br>
</p>

<p><b>Example</b><p>
<pre><code class="js">
columns: [{
  index: 'price',
  align: 'right',
</code></pre>

<p><b>Default</b><p>
<pre><code class="js">
'left'
</code></pre>
