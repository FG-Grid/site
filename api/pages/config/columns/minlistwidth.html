<h3>minListWidth</h3>
<code class="type">Number</code>

<p>
  The minimum column filter list width.</br>
  It is used only if <code class="js">filter: { list: true }</code> is set.
</p>

<p><b>Example</b></p>
<pre><code class="js">
minListWidth: 140,
</code></pre>

<p><b>Default</b><p>
<pre><code class="js">
50
</code></pre>
