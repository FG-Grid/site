<h3>menuVisibility</h3>
<code class="type">String</code>

<p>
  It changes column header menu behavior.<br>
  Values: 'hover', 'always'
</p>

<p><b>Example</b><p>
<pre><code class="js">
{
  index: 'price',
  type: 'currency',
  width: 100,
  menuVisibility: 'hover'
}
</code></pre>

<p><b>Default</b><p>
<pre><code class="js">
'always'
</code></pre>
